name: PR preview diagnosis

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  tell-proof:
    if: vars.TELL_PREVIEW_URL != '' || github.event.pull_request.body != ''
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm -F @tell/core exec playwright install chromium

      - name: Resolve preview URL
        id: preview
        env:
          REPO_PREVIEW_URL: ${{ vars.TELL_PREVIEW_URL }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          URL="${REPO_PREVIEW_URL}"
          if [ -z "$URL" ]; then
            URL="$(printf '%s' "$PR_BODY" | grep -Eo 'https://[a-zA-Z0-9./?=_%:-]+' | head -1 || true)"
          fi
          if [ -z "$URL" ]; then
            echo "No preview URL configured. Set repo variable TELL_PREVIEW_URL or include a URL in the PR body."
            exit 0
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Diagnose preview
        if: steps.preview.outputs.url != ''
        env:
          TELL_PREVIEW_URL: ${{ steps.preview.outputs.url }}
          TELL_FAIL_GENERIC_ABOVE: ${{ vars.TELL_FAIL_GENERIC_ABOVE || '6' }}
        run: |
          pnpm -F @tell/schema build
          pnpm -F @tell/core build
          pnpm pr:diagnose

      - name: Upload diagnosis artifact
        if: steps.preview.outputs.url != ''
        uses: actions/upload-artifact@v4
        with:
          name: tell-pr-report
          path: tell-pr-report.json
