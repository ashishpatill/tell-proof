name: PR proof compare

# Runs Tell Proof compare mode when UI/engine surfaces change.
# - Always compares committed baseline vs itself as a smoke check (must be "review").
# - When TELL_PREVIEW_URL (or a Vercel URL in the PR body) is available, compares
#   baseline → live diagnose as an informational proof signal (does not fail on "review").

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "apps/web/**"
      - "packages/core/**"
      - "packages/redesign/**"
      - "packages/schema/**"
      - "packages/taste/**"
      - "fixtures/reports/**"
      - "fixtures/corpus/**"
      - "fixtures/generic-app/**"
      - "scripts/capture-scenario-matrix.ts"
      - "scripts/mint-fixture-auth.ts"
      - "scripts/pr-proof-*.ts"
      - "package.json"
      - ".cursor/rules/tell-proof-verify.mdc"
      - ".cursor/skills/tell-proof-verify/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  proof-compare:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: |
          pnpm -F @tell/schema build
          pnpm -F @tell/core build

      - name: Smoke compare (baseline vs baseline)
        env:
          TELL_BEFORE_REPORT: fixtures/reports/tell-report.json
          TELL_AFTER_REPORT: fixtures/reports/tell-report.json
          TELL_FAIL_ON: failed,passed
        run: pnpm proof:compare

      - name: Smoke scenario matrix (fixture vs itself)
        env:
          TELL_BEFORE_MATRIX: fixtures/corpus/scenario-matrix.json
          TELL_AFTER_MATRIX: fixtures/corpus/scenario-matrix.json
          TELL_FAIL_ON: failed,passed
        run: pnpm proof:matrix

      - name: Install Playwright Chromium
        run: pnpm -F @tell/core exec playwright install chromium --with-deps

      - name: Start generic-app fixture
        run: |
          pnpm -F @tell/generic-app dev > /tmp/tell-fixture.log 2>&1 &
          echo $! > /tmp/tell-fixture.pid
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3001/ >/dev/null; then
              echo "Fixture ready"
              exit 0
            fi
            sleep 2
          done
          echo "Fixture failed to start"; cat /tmp/tell-fixture.log; exit 1

      - name: Mint fixture auth storage state
        env:
          TELL_FIXTURE_URL: http://localhost:3001
          TELL_AUTH_STORAGE_STATE: fixtures/generic-app/auth-storage.json
        run: pnpm auth:fixture

      - name: Live scenario matrix against fixture
        env:
          TELL_MATRIX_URL: http://localhost:3001
          TELL_MATRIX_ROUTES: /,/pricing,/account
          TELL_MATRIX_PLAN: live
          TELL_AUTH_STORAGE_STATE: fixtures/generic-app/auth-storage.json
          TELL_MATRIX_OUT: tell-scenario-matrix-live.json
          TELL_MATRIX_COMPARE: "1"
          TELL_PROOF_MATRIX_PATH: tell-proof-matrix-live.json
        run: pnpm capture:matrix

      - name: Stop generic-app fixture
        if: always()
        run: |
          if [ -f /tmp/tell-fixture.pid ]; then
            kill "$(cat /tmp/tell-fixture.pid)" 2>/dev/null || true
          fi

      - name: Resolve preview URL
        id: preview
        env:
          REPO_PREVIEW_URL: ${{ vars.TELL_PREVIEW_URL }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          URL="${REPO_PREVIEW_URL}"
          SOURCE="var"
          if [ -z "$URL" ]; then
            SOURCE="body"
            URL="$(printf '%s' "$PR_BODY" | grep -Eo 'https://[a-zA-Z0-9.-]+\.vercel\.app(/[a-zA-Z0-9./?=_%:-]*)?' | head -1 || true)"
          fi
          if [ -z "$URL" ]; then
            SOURCE="body"
            URL="$(printf '%s' "$PR_BODY" | grep -Eo 'https://[a-zA-Z0-9.-]+\.onrender\.com(/[a-zA-Z0-9./?=_%:-]*)?' | head -1 || true)"
          fi
          if [ -z "$URL" ]; then
            echo "No preview URL — skipping live proof compare."
            exit 0
          fi
          if [ "$SOURCE" = "body" ] && ! printf '%s' "$URL" | grep -Eq '^https://[a-zA-Z0-9.-]+\.(vercel\.app|onrender\.com)([/?#]|$)'; then
            echo "Ignoring non-preview URL from PR body: $URL"
            exit 0
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Live proof compare (preview vs itself)
        if: steps.preview.outputs.url != ''
        env:
          TELL_PREVIEW_URL: ${{ steps.preview.outputs.url }}
          TELL_COMPARE_SELF: "1"
          TELL_FAIL_ON: failed
        run: pnpm proof:compare

      - name: Live scenario matrix against preview
        if: steps.preview.outputs.url != ''
        env:
          TELL_MATRIX_URL: ${{ steps.preview.outputs.url }}
          TELL_MATRIX_ROUTES: /
          TELL_MATRIX_PLAN: live
          TELL_MATRIX_OUT: tell-scenario-matrix-preview.json
          TELL_MATRIX_COMPARE: "1"
          TELL_PROOF_MATRIX_PATH: tell-proof-matrix-preview.json
        run: pnpm capture:matrix
        continue-on-error: true

      - name: Upload proof artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tell-proof-compare
          path: |
            tell-proof-compare.json
            tell-proof-matrix.json
            tell-proof-matrix-live.json
            tell-scenario-matrix-live.json
            tell-proof-matrix-preview.json
            tell-scenario-matrix-preview.json
          if-no-files-found: ignore
